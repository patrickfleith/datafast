site_name: Datafast
site_description: Pipeline-first synthetic data generation for Python
site_author: Patrick Fleith
site_url: https://patrickfleith.github.io/datafast/

repo_name: patrickfleith/datafast
repo_url: https://github.com/patrickfleith/datafast

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tabs
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: black
      accent: teal

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
  - def_list
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Concepts: concepts.md
  - Guides:
      - guides/index.md
      - Building Pipelines: guides/building_pipelines.md
      - LLM Steps: guides/llm_steps.md
      - Checkpointing: guides/checkpointing.md
      - Langfuse Tracing: guides/langfuse_tracing.md
  - Providers: llms.md
  - Models: models.md
  - API: api.md

plugins:
  - search
